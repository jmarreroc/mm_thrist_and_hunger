[decay]
enabled=true
base_interval=30.0 ;base time in seconds at which the degradation is applied
min_interval=10.0 ;min time in seconds at which the degradation is applied
max_damage=10.0 ;max damage applied each interval (at max health)
min_damage=1.0 ;min damage applied each interval (when low health)

[sanity]
enabled=true
show_hud=true
sanity_percentage_flashes_fire_automatically=0.4 ;values: 0.0-1.0. At this percentage of sanity the flashes begin to fire automatically
flash_fire_health_percentage_threshold=1.0 ;values: 0.0-1.0. At this percentage of sanity, flashbacks begin to occur when receiving any type of considerable damage (outside the vehicle)
director_timer=30.0 ;timer in seconds to try to reproduce background sanity sounds. Probability based on current sanity percentage.
director_booster=0.1 ;values: 0.0f-1.0. probability booster if the director didn't reproduced the last time
volume_modifier=0.1 ;values: 0.0-1.0. Reduces master volume for all sanity sounds.

[roguelite]
loss_scrap_on_death=true
empty_canteen_on_loading=true
loss_fuel_on_car_damage=true
loss_fuel_on_car_damage_factor=0.1 ;values: 0.0f-1.0. when the car receives damage, a fuel percentage is drained. Car health is 100 and max fuel is 50.
fuel_modifier_on_loading=0.1 ;values: 0.0f-1.0. when loading game or fast traveling a fuel percentage is drained.
fuel_consumption_multiplier=2.0 ;values: 1.0 or higher. Multiplier for all fuel consumption (2.0 = double consumption)
